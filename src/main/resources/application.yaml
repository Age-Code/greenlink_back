spring:
  config:
    import:
      - optional:classpath:/yaml/application-keys.yaml

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

file:
  upload-dir: uploads

cloud:
  aws:
    region: ap-northeast-2
    s3:
      bucket: likelion-gwang

jwt:
  secret: greenlink-jwt-secret-key-greenlink-jwt-secret-key-2026
  access-token-validity-ms: 86400000